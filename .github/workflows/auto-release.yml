name: Package and release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: package-and-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Triggered by a tag push — use the tag as-is.
            new_version="${GITHUB_REF#refs/tags/}"
          else
            # Triggered by a push to main — bump patch from latest semver tag.
            latest=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V -r | head -n 1 || true)
            if [ -z "${latest:-}" ]; then
              new_version="v1.0.0"
            else
              v="${latest#v}"
              major="${v%%.*}"
              rest="${v#*.}"
              minor="${rest%%.*}"
              patch="${rest#*.}"
              patch=$((patch + 1))
              new_version="v${major}.${minor}.${patch}"
            fi
          fi
          echo "Using version: $new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (only on push to main)
        if: github.ref == 'refs/heads/main'
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Package and release
        uses: BigWigsMods/packager@v2
        env:
          # Force the packager to treat this run as a tagged release, even
          # when triggered by a push to main. Without this override, the
          # packager sees refs/heads/main, runs in branch-build mode, and
          # skips creating the GitHub release / release.json.
          GITHUB_REF: refs/tags/${{ steps.version.outputs.version }}
