name: Package and release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: package-and-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-tag (only on push to main)
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V -r | head -n 1 || true)
          if [ -z "${latest:-}" ]; then
            new_version="v1.0.0"
          else
            v="${latest#v}"
            major="${v%%.*}"
            rest="${v#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            patch=$((patch + 1))
            new_version="v${major}.${minor}.${patch}"
          fi
          echo "Tagging $new_version"
          git tag "$new_version"
          git push origin "$new_version"

      - name: Package and release
        uses: BigWigsMods/packager@v2
